name = "rowo-auth"
main = "worker.js"
compatibility_date = "2026-04-16"
workers_dev = false

# Set this in CI or locally before deploy:
# CLOUDFLARE_ACCOUNT_ID=your_account_id
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[[d1_databases]]
binding = "auth_database"
database_name = "rowo-auth-db"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
ADFS_PROVIDER_ENDPOINT = "https://adfs.example.edu/login"
ALLOWED_EMAIL_DOMAIN = "uwaterloo.ca"
AWS_REGION = "us-east-1"
CORS_ALLOW_ORIGINS = "*"
DISCORD_REDIRECT_URI = "https://rowo.link/verify/discord/callback"
EMAIL_SENDS_PER_MINUTE = "60"
GITHUB_CLIENT_ID = ""
GITHUB_REDIRECT_URI = "https://rowo.link/verify/github/callback"
SES_FROM_EMAIL = "verification@rowo.link"
SES_FROM_NAME = "ROwO Auth"
# GITHUB_CLIENT_SECRET, DISCORD_CLIENT_SECRET, DISCORD_BOT_TOKEN,
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SENSITIVE_DATA_HASH_SECRET,
# ADFS_JWT_SECRET must be set as Wrangler secrets (wrangler secret put ...).

[env.production]
name = "rowo-auth"

[[env.production.d1_databases]]
binding = "auth_database"
database_name = "rowo-auth-db"
database_id = "YOUR_PRODUCTION_D1_DATABASE_ID"

[env.production.vars]
ADFS_PROVIDER_ENDPOINT = "https://adfs.example.edu/login"
ALLOWED_EMAIL_DOMAIN = "uwaterloo.ca"
AWS_REGION = "us-east-1"
CORS_ALLOW_ORIGINS = "*"
DISCORD_REDIRECT_URI = "https://rowo.link/verify/discord/callback"
EMAIL_SENDS_PER_MINUTE = "60"
GITHUB_CLIENT_ID = ""
GITHUB_REDIRECT_URI = "https://rowo.link/verify/github/callback"
SES_FROM_EMAIL = "verification@rowo.link"
SES_FROM_NAME = "ROwO Auth"
